name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: frame-size
    attributes:
      label: Frame size
      options:
        - 25×25 cm
        - 50×50 cm
        - Both
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Select frame size...
        2. Pick a team...
        3. Click Export...
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional info (screenshots, error messages)
